name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build dummy test binary
        run: |
          bun build --compile --sourcemap=inline \
            src/lib/tests/dummy/index.ts --outfile src/lib/tests/dummy/dummy

      - name: Unit tests
        run: DUMMY_VERSION=$(bun --version) bun test

      - run: bun run typecheck
      - run: bun run lint

  # The package claims `engines.node >= 18`. Prove it: build dist/, then run the
  # built CLI against a real Bun-compiled binary on each supported Node major.
  node-compat:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build dist/ and a Bun-compiled fixture
        run: |
          bun run build
          bun build --compile --sourcemap=inline \
            src/lib/tests/dummy/index.ts --outfile /tmp/dummy

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Extract with the built CLI under Node (no Bun on PATH semantics)
        run: |
          node --version
          node dist/cli.js /tmp/dummy -o /tmp/out
          test -f /tmp/out/index.js || { echo "::error::index.js not extracted"; exit 1; }
          echo "extracted $(ls /tmp/out | wc -l) files"

      - name: Library entry point resolves under Node
        run: |
          node --input-type=module -e '
            import { extractBundledFiles } from "./dist/lib/index.js";
            import { readFile } from "node:fs/promises";
            const files = extractBundledFiles(await readFile("/tmp/dummy"));
            if (!files.some((f) => f.path === "index.js")) process.exit(1);
            console.log("library OK:", files.length, "files");
          '

  # Slow: downloads several Bun releases and compiles ~60MB binaries each.
  # Covers every metadata format plus ELF/PE section extraction.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Cache downloaded Bun versions
        uses: actions/cache@v4
        with:
          path: ~/.cache/bun-decompile
          key: bun-versions-${{ hashFiles('src/scripts/e2e-test.sh', 'src/scripts/get-bun.sh') }}

      - run: bun install --frozen-lockfile
      - run: bun run test:e2e
